<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical Decision Support | Hospitrax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    :root { color-scheme: dark; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; background: #0f172a; color: #e2e8f0; }
    .fade-slide { animation: fadeSlide 0.45s ease forwards; opacity: 0; transform: translateY(16px); }
    @keyframes fadeSlide { to { opacity: 1; transform: translateY(0); } }
    .field-focus:focus { outline: none; box-shadow: 0 0 0 3px rgba(13,148,136,0.18); }

    /* Model card — single column list */
    .model-list { display: flex; flex-direction: column; gap: 12px; }

    .model-card {
      position: relative;
      border-radius: 18px;
      border: 1.5px solid rgba(51,65,85,0.8);
      background: rgba(15,23,42,0.85);
      padding: 18px 20px;
      cursor: pointer;
      transition: all 0.22s ease;
      text-align: left;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .model-card:hover { border-color: rgba(13,148,136,0.45); background: rgba(13,148,136,0.05); }
    .model-card.active {
      border-color: rgba(13,148,136,0.9);
      background: rgba(13,148,136,0.09);
      box-shadow: 0 0 0 1px rgba(13,148,136,0.3), 0 6px 24px rgba(13,148,136,0.12);
    }

    /* Number badge */
    .model-num {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1.5px solid rgba(51,65,85,0.9);
      background: rgba(15,23,42,0.6);
      font-size: 14px;
      font-weight: 700;
      color: #475569;
      flex-shrink: 0;
      transition: all 0.22s ease;
    }
    .model-card.active .model-num {
      border-color: rgba(13,148,136,0.6);
      color: #2dd4bf;
      background: rgba(13,148,136,0.12);
    }

    .model-icon-wrap {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .model-body { flex: 1; min-width: 0; }
    .model-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
    .model-stat {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: #475569;
    }
    .model-card.active .model-stat { color: #64748b; }

    .model-card-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .model-card-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #0d9488;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(0.6);
      transition: all 0.22s ease;
      flex-shrink: 0;
    }
    .model-card.active .model-card-check { opacity: 1; transform: scale(1); }

    /* Custom API input inside the card */
    .custom-api-fields {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(51,65,85,0.6);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .custom-api-fields input, .custom-api-fields select {
      width: 100%;
      border-radius: 10px;
      border: 1.5px solid rgba(51,65,85,0.9);
      background: rgba(5,12,30,0.7);
      padding: 8px 12px;
      font-size: 12px;
      color: #cbd5e1;
      outline: none;
      transition: border-color 0.18s;
      box-sizing: border-box;
    }
    .custom-api-fields input:focus, .custom-api-fields select:focus {
      border-color: rgba(13,148,136,0.6);
    }
    .custom-api-fields label {
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 4px;
    }
    .custom-mode-toggle {
      display: flex;
      gap: 6px;
      padding: 4px;
      border-radius: 12px;
      background: rgba(5, 12, 30, 0.8);
      border: 1px solid rgba(51, 65, 85, 0.7);
      margin-bottom: 4px;
    }
    .custom-mode-btn {
      flex: 1;
      border: none;
      border-radius: 9px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.18s ease;
      background: transparent;
      color: #64748b;
    }
    .custom-mode-btn.active {
      background: rgba(13, 148, 136, 0.18);
      color: #2dd4bf;
      box-shadow: 0 0 0 1px rgba(13, 148, 136, 0.25);
    }
    .custom-step {
      border-radius: 12px;
      border: 1px solid rgba(51, 65, 85, 0.55);
      background: rgba(5, 12, 30, 0.45);
      padding: 12px 14px;
    }
    .custom-step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: rgba(13, 148, 136, 0.15);
      color: #2dd4bf;
      font-size: 10px;
      font-weight: 700;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .custom-step.done .custom-step-num {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
    }
    .custom-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 9px;
      border: 1px solid rgba(13, 148, 136, 0.35);
      background: rgba(13, 148, 136, 0.12);
      color: #5eead4;
      font-size: 11px;
      font-weight: 600;
      padding: 7px 12px;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .custom-action-btn:hover:not(:disabled) {
      background: rgba(13, 148, 136, 0.22);
      border-color: rgba(13, 148, 136, 0.55);
    }
    .custom-action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .custom-status-ok { color: #34d399; font-size: 11px; }
    .custom-status-err { color: #f87171; font-size: 11px; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>
  <script>
    const { useState, useEffect } = React;
    const t = React.createElement;

    function SvgIcon({ paths, size = 20, className = '', viewBox = '0 0 24 24', fill = 'none', strokeWidth = 2, style }) {
      return t('svg', {
        xmlns: 'http://www.w3.org/2000/svg', viewBox,
        fill, stroke: fill === 'none' ? 'currentColor' : 'none',
        strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round',
        width: size, height: size, className, style,
      }, ...(Array.isArray(paths) ? paths : [paths]).map((d, i) =>
        typeof d === 'string'
          ? t('path', { key: i, d })
          : t('circle', { key: i, ...d })
      ));
    }

    const Icons = {
      Zap:          ({ size, className, style }) => t(SvgIcon, { size, className, style, paths: 'M13 2L3 14h7l-1 8 10-12h-7z' }),

      Sparkles:     ({ size, className, style }) => t(SvgIcon, { size, className, style, paths: ['M12 2.5l1.6 4.9 5.1.7-3.9 3.8.9 5.1-4.7-2.5-4.7 2.5.9-5.1-3.9-3.8 5.1-.7z', 'M19 2l.5 1.5L21 4l-1.5.5L19 6l-.5-1.5L17 4l1.5-.5z', 'M5 18l.4 1.2L6.6 19.6l-1.2.4L5 21.2l-.4-1.2L3.4 19.6l1.2-.4z'] }),
      Check:        ({ size, className, style }) => t(SvgIcon, { size, className, style, paths: 'M5 12l5 5L20 7' }),
      AlertCircle:  ({ size, className }) => t(SvgIcon, { size, className, paths: ['M12 8v5m0 4h.01', 'M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0'] }),
      AlertTriangle:({ size, className }) => t(SvgIcon, { size, className, paths: 'M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01' }),
      Pill:         ({ size, className }) => t(SvgIcon, { size, className, paths: 'M10.5 20H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H20a2 2 0 0 1 2 2v3M12 22v-6m-3 3h6M22 17.5a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0z' }),
      ListChecks:   ({ size, className }) => t(SvgIcon, { size, className, paths: ['M9 12l2 2 4-4', 'M4 6h16M4 12h3M4 18h3'] }),
      ArrowRight:   ({ size, className }) => t(SvgIcon, { size, className, paths: 'M5 12h14m-5-5 5 5-5 5' }),
      Cpu:          ({ size, className }) => t(SvgIcon, { size, className, paths: ['M9 3H5a2 2 0 0 0-2 2v4m6-6h6m-6 0v6m6-6h4a2 2 0 0 1 2 2v4m-6-6v6m0 0H3m6 0v6m6-6v6m0 0h4a2 2 0 0 1-2 2H9m6 0H9m0 0H5a2 2 0 0 1-2-2v-4'] }),
      ChevronDown:  ({ size, className }) => t(SvgIcon, { size, className, paths: 'M6 9l6 6 6-6' }),
      ChevronUp:    ({ size, className }) => t(SvgIcon, { size, className, paths: 'M18 15l-6-6-6 6' }),
      FileText:     ({ size, className }) => t(SvgIcon, { size, className, paths: ['M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z', 'M14 2v6h6M16 13H8m8 4H8m2-8H8'] }),
      Clock:        ({ size, className }) => t(SvgIcon, { size, className, paths: ['M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z', 'M12 6v6l4 2'] }),
      Cloud:        ({ size, className }) => t(SvgIcon, { size, className, paths: 'M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z' }),
      Server:       ({ size, className }) => t(SvgIcon, { size, className, paths: ['M2 2h20v8H2zM2 14h20v8H2z', 'M6 6h.01M6 18h.01'] }),
      Activity:     ({ size, className }) => t(SvgIcon, { size, className, paths: 'M22 12h-4l-3 9L9 3l-3 9H2' }),
      Key:          ({ size, className, style }) => t(SvgIcon, { size, className, style, paths: 'M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4' }),
      RefreshCw:    ({ size, className, style }) => t(SvgIcon, { size, className, style, paths: ['M21 2v6h-6', 'M3 12a9 9 0 0 1 15-6.7L21 8', 'M3 22v-6h6', 'M21 12a9 9 0 0 1-15 6.7L3 16'] }),
      CheckCircle:  ({ size, className }) => t(SvgIcon, { size, className, paths: ['M22 11.08V12a10 10 0 1 1-5.93-9.14', 'M22 4L12 14.01l-3-3'] }),
      XCircle:      ({ size, className }) => t(SvgIcon, { size, className, paths: ['M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z', 'M15 9l-6 6M9 9l6 6'] }),
      Settings:     ({ size, className }) => t(SvgIcon, { size, className, paths: ['M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z', 'M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z'] }),
      Wand:         ({ size, className }) => t(SvgIcon, { size, className, paths: ['M15 4V2m0 2a2 2 0 0 1 2 2m-2-2a2 2 0 0 0-2 2', 'M9 20l-5-5 5-5', 'M21 3l-6 6', 'M9 9l6 6'] }),
    };

    const PROVIDERS = [
      { id: 'groq',       name: 'Groq',           baseUrl: 'https://api.groq.com/openai/v1' },
      { id: 'openai',     name: 'OpenAI',         baseUrl: 'https://api.openai.com/v1' },
      { id: 'openrouter', name: 'OpenRouter',     baseUrl: 'https://openrouter.ai/api/v1' },
      { id: 'together',   name: 'Together AI',    baseUrl: 'https://api.together.xyz/v1' },
      { id: 'gemini',     name: 'Google Gemini',  baseUrl: 'https://generativelanguage.googleapis.com/v1beta/openai' },
      { id: 'mistral',    name: 'Mistral AI',     baseUrl: 'https://api.mistral.ai/v1' },
      { id: 'ollama',     name: 'Ollama (Local)', baseUrl: 'http://localhost:11434/v1' },
    ];

    function normalizeBaseUrl(url) {
      return (url || '').trim().replace(/\/+$/, '');
    }

    function parseModelsResponse(data) {
      const list = data?.data || data?.models || [];
      return list
        .map(m => (typeof m === 'string' ? m : (m.id || m.name || '')))
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b));
    }

    async function queryProviderModels(baseUrl, apiKey) {
      const url = `${normalizeBaseUrl(baseUrl)}/models`;
      const res = await fetch(url, {
        headers: {
          Authorization: `Bearer ${apiKey}`,
          'Content-Type': 'application/json',
        },
      });
      if (!res.ok) {
        let detail = `HTTP ${res.status}`;
        try {
          const body = await res.json();
          detail = body.error?.message || body.detail || detail;
        } catch (_) {
          detail = (await res.text()).slice(0, 120) || detail;
        }
        if (res.status === 401 || res.status === 403) throw new Error('Invalid API key or unauthorized.');
        throw new Error(detail);
      }
      return parseModelsResponse(await res.json());
    }

    function corsHint(err) {
      if (err?.message?.includes('Failed to fetch') || err?.name === 'TypeError') {
        return 'Browser blocked the request (CORS). Use Manual mode to enter settings, or proxy via your API server.';
      }
      return err?.message || 'Request failed.';
    }

    // ── Model definitions (reordered: MedGemma=1, Groq=2, Ollama=3, Custom=4) ──
    const MODELS = [
      {
        id: 'medgemma',
        num: 1,
        name: 'MedGemma',
        model: 'Gemma 4B · Fine-tuned',
        speed: '~20–50s',
        type: 'Local · Fine-tuned',
        description: 'Custom fine-tuned on 450 CDSS-specific examples. 100% offline — no patient data leaves the hospital.',
        icon: 'Sparkles',
        iconBg: 'rgba(13,148,136,0.18)',
        iconColor: '#2dd4bf',
        badge: 'Recommended',
        badgeBg: 'rgba(13,148,136,0.12)',
        badgeColor: '#2dd4bf',
        stats: [
          { icon: 'Clock', label: '20–50s response' },
          { icon: 'Server', label: 'Runs locally' },
          { icon: 'Activity', label: 'CDSS fine-tuned' },
        ],
      },
      {
        id: 'groq',
        num: 2,
        name: 'Groq Cloud',
        model: 'Llama 3.3 70B',
        speed: '~1–2s',
        type: 'Cloud API',
        description: 'Fastest responses via Groq\'s LPU inference chips. Requires internet — best for real-time clinical workflow.',
        icon: 'Zap',
        iconBg: 'rgba(234,179,8,0.15)',
        iconColor: '#fbbf24',
        badge: 'Fastest',
        badgeBg: 'rgba(234,179,8,0.12)',
        badgeColor: '#fbbf24',
        stats: [
          { icon: 'Clock', label: '1–2s response' },
          { icon: 'Cloud', label: 'Groq LPU cloud' },
          { icon: 'Activity', label: '70B parameters' },
        ],
      },
      {
        id: 'ollama',
        num: 3,
        name: 'Ollama Mistral',
        model: 'Mistral 7B',
        speed: '~200s',
        type: 'Local · Offline',
        description: 'Stock Mistral 7B via Ollama — fully air-gapped on CPU. No fine-tuning applied. Slowest option.',
        icon: 'Flame',
        iconBg: 'rgba(239,68,68,0.13)',
        iconColor: '#f87171',
        badge: 'Air-gapped',
        badgeBg: 'rgba(239,68,68,0.10)',
        badgeColor: '#f87171',
        stats: [
          { icon: 'Clock', label: '~200s response' },
          { icon: 'Server', label: 'Fully offline' },
          { icon: 'Activity', label: 'Mistral 7B' },
        ],
      },
      {
        id: 'custom',
        num: 4,
        name: 'Custom LLM API',
        model: 'Your choice',
        speed: 'Varies',
        type: 'Custom · Configurable',
        description: 'Connect any OpenAI-compatible API. Use Guided Setup (provider → validate key → fetch models) or Manual Entry for custom endpoints.',
        icon: 'Key',
        iconBg: 'rgba(139,92,246,0.16)',
        iconColor: '#c084fc',
        badge: 'Custom',
        badgeBg: 'rgba(139,92,246,0.12)',
        badgeColor: '#c084fc',
        stats: [
          { icon: 'Clock', label: 'Varies by provider' },
          { icon: 'Cloud', label: 'Any API endpoint' },
          { icon: 'Activity', label: 'Model of choice' },
        ],
      },
    ];

    const SAMPLE_PATIENTS = [
      { label: 'Iron-deficiency anaemia (likely)', patient: { age:'28', sex:'Female', chief_complaint:'Fatigue, weakness, pale skin, dizziness on standing, heavy periods', bp_systolic:'100', bp_diastolic:'65', blood_sugar:'85', blood_sugar_context:'fasting', weight_kg:'50', height_cm:'155', temperature_c:'36.8', pulse_bpm:'105' } },
      { label: 'Hypertensive crisis (urgent)', patient: { age:'60', sex:'Male', chief_complaint:'Severe headache, blurred vision, chest discomfort', bp_systolic:'188', bp_diastolic:'124', blood_sugar:'110', blood_sugar_context:'random', weight_kg:'82', height_cm:'172', temperature_c:'36.9', pulse_bpm:'90' } },
      { label: 'Type 2 Diabetes suspicious', patient: { age:'50', sex:'Male', chief_complaint:'Increased thirst, frequent urination, fatigue', bp_systolic:'128', bp_diastolic:'82', blood_sugar:'215', blood_sugar_context:'random', weight_kg:'90', height_cm:'170', temperature_c:'37.0', pulse_bpm:'84' } },
      { label: 'Community-acquired pneumonia', patient: { age:'45', sex:'Female', chief_complaint:'Fever, productive cough, shortness of breath', bp_systolic:'118', bp_diastolic:'76', blood_sugar:'98', blood_sugar_context:'random', weight_kg:'68', height_cm:'162', temperature_c:'38.9', pulse_bpm:'110' } },
      { label: 'Acute gastroenteritis', patient: { age:'22', sex:'Male', chief_complaint:'Watery diarrhea, vomiting, abdominal cramps', bp_systolic:'105', bp_diastolic:'65', blood_sugar:'90', blood_sugar_context:'random', weight_kg:'60', height_cm:'175', temperature_c:'37.5', pulse_bpm:'98' } },
      { label: 'Uncomplicated UTI', patient: { age:'30', sex:'Female', chief_complaint:'Dysuria, frequency, low abdominal discomfort', bp_systolic:'112', bp_diastolic:'70', blood_sugar:'88', blood_sugar_context:'random', weight_kg:'58', height_cm:'160', temperature_c:'36.7', pulse_bpm:'76' } },
      { label: 'Asthma exacerbation (mild)', patient: { age:'35', sex:'Male', chief_complaint:'Wheezing, shortness of breath, cough at night', bp_systolic:'120', bp_diastolic:'78', blood_sugar:'95', blood_sugar_context:'random', weight_kg:'75', height_cm:'178', temperature_c:'36.6', pulse_bpm:'100' } },
    ];

    const defaultForm = { age:'', sex:'', chief_complaint:'', bp_systolic:'', bp_diastolic:'', blood_sugar:'', blood_sugar_context:'random', weight_kg:'', height_cm:'', temperature_c:'', pulse_bpm:'' };
    const defaultCustom = {
      mode: 'guided',
      provider: 'groq',
      endpoint: 'https://api.groq.com/openai/v1',
      apiKey: '',
      modelName: '',
      models: [],
      keyValidated: false,
    };

    function validate(form) {
      const e = {};
      if (!form.age) e.age = 'Required.'; else if (!(form.age >= 1 && form.age <= 120)) e.age = 'Age 1–120.';
      if (!form.sex) e.sex = 'Required.';
      if (!form.chief_complaint) e.chief_complaint = 'Required.';
      if (!form.bp_systolic) e.bp_systolic = 'Required.'; else if (!(form.bp_systolic >= 50 && form.bp_systolic <= 300)) e.bp_systolic = '50–300 mmHg.';
      if (!form.bp_diastolic) e.bp_diastolic = 'Required.'; else if (!(form.bp_diastolic >= 30 && form.bp_diastolic <= 200)) e.bp_diastolic = '30–200 mmHg.';
      if (form.blood_sugar !== '' && !(form.blood_sugar >= 20 && form.blood_sugar <= 600)) e.blood_sugar = '20–600 mg/dL.';
      if (form.temperature_c !== '' && !(form.temperature_c >= 30 && form.temperature_c <= 45)) e.temperature_c = '30–45°C.';
      if (form.pulse_bpm !== '' && !(form.pulse_bpm >= 20 && form.pulse_bpm <= 250)) e.pulse_bpm = '20–250 bpm.';
      return e;
    }

    function getActionBadge(action) {
      if (action === 'full_recommendation') return { label: 'Full Recommendation', color: 'bg-emerald-500/10 text-emerald-300' };
      if (action === 'diagnosis_only') return { label: 'Diagnosis Only', color: 'bg-amber-500/10 text-amber-300' };
      if (action === 'refer') return { label: 'Refer to Specialist', color: 'bg-red-500/10 text-red-300' };
      return { label: action || 'Unknown', color: 'bg-slate-700 text-slate-200' };
    }

    // ── Custom LLM configuration (guided + manual) ─────────────────────────
    function CustomConfigPanel({ customConfig, setCustomConfig, errors, setErrors }) {
      const [keyValidating, setKeyValidating] = useState(false);
      const [fetchingModels, setFetchingModels] = useState(false);
      const [validateMsg, setValidateMsg] = useState(null);
      const [fetchMsg, setFetchMsg] = useState(null);

      const mode = customConfig.mode || 'guided';
      const selectedProvider = PROVIDERS.find(p => p.id === customConfig.provider) || PROVIDERS[0];

      function switchMode(nextMode) {
        setCustomConfig(p => {
          if (nextMode === 'guided') {
            const prov = PROVIDERS.find(x => x.id === (p.provider || 'groq')) || PROVIDERS[0];
            return { ...p, mode: nextMode, endpoint: prov.baseUrl };
          }
          return { ...p, mode: nextMode };
        });
        setValidateMsg(null);
        setFetchMsg(null);
      }

      function onProviderChange(providerId) {
        const prov = PROVIDERS.find(p => p.id === providerId) || PROVIDERS[0];
        setCustomConfig(p => ({
          ...p,
          provider: prov.id,
          endpoint: prov.baseUrl,
          modelName: '',
          models: [],
          keyValidated: false,
        }));
        setValidateMsg(null);
        setFetchMsg(null);
        if (errors.custom_endpoint) setErrors(e => ({ ...e, custom_endpoint: undefined }));
      }

      function onApiKeyChange(value) {
        setCustomConfig(p => ({ ...p, apiKey: value, keyValidated: false, models: [], modelName: '' }));
        setValidateMsg(null);
        setFetchMsg(null);
        if (errors.custom_apiKey) setErrors(e => ({ ...e, custom_apiKey: undefined }));
      }

      async function validateKey() {
        const baseUrl = mode === 'guided' ? selectedProvider.baseUrl : customConfig.endpoint;
        const key = customConfig.apiKey?.trim();
        if (!key) {
          setErrors(e => ({ ...e, custom_apiKey: 'API key is required.' }));
          return;
        }
        if (mode === 'manual' && !baseUrl?.trim()) {
          setErrors(e => ({ ...e, custom_endpoint: 'Base URL is required.' }));
          return;
        }
        setKeyValidating(true);
        setValidateMsg(null);
        try {
          await queryProviderModels(baseUrl, key);
          setCustomConfig(p => ({ ...p, keyValidated: true, endpoint: normalizeBaseUrl(baseUrl) }));
          setValidateMsg({ ok: true, text: 'API key validated successfully.' });
        } catch (err) {
          setCustomConfig(p => ({ ...p, keyValidated: false }));
          setValidateMsg({ ok: false, text: corsHint(err) });
        } finally {
          setKeyValidating(false);
        }
      }

      async function fetchModels() {
        const baseUrl = mode === 'guided' ? customConfig.endpoint || selectedProvider.baseUrl : customConfig.endpoint;
        const key = customConfig.apiKey?.trim();
        if (!key) {
          setErrors(e => ({ ...e, custom_apiKey: 'API key is required.' }));
          return;
        }
        setFetchingModels(true);
        setFetchMsg(null);
        try {
          const models = await queryProviderModels(baseUrl, key);
          if (!models.length) throw new Error('No models returned by this provider.');
          setCustomConfig(p => ({
            ...p,
            models,
            endpoint: normalizeBaseUrl(baseUrl),
            keyValidated: true,
            modelName: p.modelName && models.includes(p.modelName) ? p.modelName : models[0],
          }));
          setFetchMsg({ ok: true, text: `${models.length} model(s) loaded.` });
          if (errors.custom_modelName) setErrors(e => ({ ...e, custom_modelName: undefined }));
        } catch (err) {
          setFetchMsg({ ok: false, text: corsHint(err) });
        } finally {
          setFetchingModels(false);
        }
      }

      const step1Done = !!customConfig.provider;
      const step2Done = customConfig.keyValidated;
      const step3Done = (customConfig.models || []).length > 0;
      const step4Done = !!customConfig.modelName;

      return t('div', { className: 'custom-api-fields', onClick: e => e.stopPropagation() },
        // Mode toggle
        t('div', { className: 'custom-mode-toggle' },
          t('button', {
            type: 'button',
            className: `custom-mode-btn${mode === 'guided' ? ' active' : ''}`,
            onClick: () => switchMode('guided'),
          },
            t('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '5px' } },
              t(Icons.Wand, { size: 12 }),
              'Guided Setup'
            )
          ),
          t('button', {
            type: 'button',
            className: `custom-mode-btn${mode === 'manual' ? ' active' : ''}`,
            onClick: () => switchMode('manual'),
          },
            t('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '5px' } },
              t(Icons.Settings, { size: 12 }),
              'Manual Entry'
            )
          )
        ),

        mode === 'guided'
          ? t('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px' } },
              // Step 1 — Provider
              t('div', { className: `custom-step${step1Done ? ' done' : ''}` },
                t('div', { style: { display: 'flex', alignItems: 'center', marginBottom: '8px' } },
                  t('span', { className: 'custom-step-num' }, '1'),
                  t('span', { style: { fontSize: '12px', fontWeight: '600', color: '#cbd5e1' } }, 'Select Provider')
                ),
                t('select', {
                  value: customConfig.provider || 'groq',
                  onChange: e => onProviderChange(e.target.value),
                },
                  PROVIDERS.map(p => t('option', { key: p.id, value: p.id }, p.name))
                ),
                t('p', {
                  style: { fontSize: '11px', color: '#64748b', marginTop: '6px', fontFamily: 'monospace' }
                }, `Base URL: ${selectedProvider.baseUrl}`)
              ),

              // Step 2 — API Key + Validate
              t('div', { className: `custom-step${step2Done ? ' done' : ''}` },
                t('div', { style: { display: 'flex', alignItems: 'center', marginBottom: '8px' } },
                  t('span', { className: 'custom-step-num' }, '2'),
                  t('span', { style: { fontSize: '12px', fontWeight: '600', color: '#cbd5e1' } }, 'Enter API Key')
                ),
                t('div', { style: { display: 'flex', gap: '8px', alignItems: 'flex-start' } },
                  t('div', { style: { flex: 1 } },
                    t('input', {
                      type: 'password',
                      placeholder: 'Paste your API key',
                      value: customConfig.apiKey,
                      style: {
                        fontFamily: 'monospace',
                        letterSpacing: '0.04em',
                        ...(errors.custom_apiKey ? { borderColor: 'rgba(239, 68, 68, 0.6)' } : {}),
                      },
                      onChange: e => onApiKeyChange(e.target.value),
                    }),
                    errors.custom_apiKey && t('p', { className: 'mt-1.5 text-xs text-rose-300 text-left' }, errors.custom_apiKey)
                  ),
                  t('button', {
                    type: 'button',
                    className: 'custom-action-btn',
                    disabled: keyValidating || !customConfig.apiKey?.trim(),
                    onClick: validateKey,
                  },
                    keyValidating
                      ? t('span', { className: 'spin inline-block w-3.5 h-3.5 rounded-full border-2 border-teal-300/30 border-t-teal-300' })
                      : t(Icons.CheckCircle, { size: 13 }),
                    keyValidating ? 'Validating…' : 'Validate Key'
                  )
                ),
                validateMsg && t('p', {
                  className: validateMsg.ok ? 'custom-status-ok' : 'custom-status-err',
                  style: { marginTop: '6px', display: 'flex', alignItems: 'center', gap: '5px' }
                },
                  validateMsg.ok
                    ? t(Icons.CheckCircle, { size: 12 })
                    : t(Icons.XCircle, { size: 12 }),
                  validateMsg.text
                )
              ),

              // Step 3 — Fetch Models
              t('div', { className: `custom-step${step3Done ? ' done' : ''}` },
                t('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '10px', marginBottom: '8px' } },
                  t('div', { style: { display: 'flex', alignItems: 'center' } },
                    t('span', { className: 'custom-step-num' }, '3'),
                    t('span', { style: { fontSize: '12px', fontWeight: '600', color: '#cbd5e1' } }, 'Fetch Models')
                  ),
                  t('button', {
                    type: 'button',
                    className: 'custom-action-btn',
                    disabled: fetchingModels || !customConfig.apiKey?.trim(),
                    onClick: fetchModels,
                  },
                    fetchingModels
                      ? t('span', { className: 'spin inline-block w-3.5 h-3.5 rounded-full border-2 border-teal-300/30 border-t-teal-300' })
                      : t(Icons.RefreshCw, { size: 13 }),
                    fetchingModels ? 'Fetching…' : 'Fetch Models'
                  )
                ),
                fetchMsg && t('p', {
                  className: fetchMsg.ok ? 'custom-status-ok' : 'custom-status-err',
                  style: { display: 'flex', alignItems: 'center', gap: '5px' }
                },
                  fetchMsg.ok ? t(Icons.CheckCircle, { size: 12 }) : t(Icons.XCircle, { size: 12 }),
                  fetchMsg.text
                ),
                !fetchMsg && !step3Done && t('p', { style: { fontSize: '11px', color: '#64748b' } },
                  'Queries the provider API for valid model names.'
                )
              ),

              // Step 4 — Select Model
              t('div', { className: `custom-step${step4Done ? ' done' : ''}` },
                t('div', { style: { display: 'flex', alignItems: 'center', marginBottom: '8px' } },
                  t('span', { className: 'custom-step-num' }, '4'),
                  t('span', { style: { fontSize: '12px', fontWeight: '600', color: '#cbd5e1' } }, 'Select Model')
                ),
                (customConfig.models || []).length > 0
                  ? t('select', {
                      value: customConfig.modelName || '',
                      style: errors.custom_modelName ? { borderColor: 'rgba(239, 68, 68, 0.6)' } : {},
                      onChange: e => {
                        setCustomConfig(p => ({ ...p, modelName: e.target.value }));
                        if (errors.custom_modelName) setErrors(err => ({ ...err, custom_modelName: undefined }));
                      },
                    },
                      t('option', { value: '' }, 'Choose a model…'),
                      customConfig.models.map(m => t('option', { key: m, value: m }, m))
                    )
                  : t('input', {
                      type: 'text',
                      disabled: true,
                      placeholder: 'Fetch models first, or switch to Manual Entry',
                      value: '',
                    }),
                errors.custom_modelName && t('p', { className: 'mt-1.5 text-xs text-rose-300 text-left' }, errors.custom_modelName)
              )
            )

          // ── Manual mode ──
          : t('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px' } },
              t('p', { style: { fontSize: '11px', color: '#64748b', lineHeight: '1.5', margin: '0 0 2px' } },
                'Enter any OpenAI-compatible endpoint, API key, and model name directly.'
              ),
              t('div', null,
                t('label', null, 'API Base URL'),
                t('input', {
                  type: 'text',
                  placeholder: 'https://api.example.com/v1',
                  value: customConfig.endpoint,
                  style: errors.custom_endpoint ? { borderColor: 'rgba(239, 68, 68, 0.6)' } : {},
                  onChange: e => {
                    setCustomConfig(p => ({ ...p, endpoint: e.target.value, keyValidated: false, models: [] }));
                    if (errors.custom_endpoint) setErrors(err => ({ ...err, custom_endpoint: undefined }));
                  },
                }),
                errors.custom_endpoint && t('p', { className: 'mt-1.5 text-xs text-rose-300 text-left' }, errors.custom_endpoint)
              ),
              t('div', null,
                t('label', null, 'API Key'),
                t('div', { style: { display: 'flex', gap: '8px', alignItems: 'flex-start' } },
                  t('div', { style: { flex: 1 } },
                    t('input', {
                      type: 'password',
                      placeholder: 'Your API key',
                      value: customConfig.apiKey,
                      style: {
                        fontFamily: 'monospace',
                        ...(errors.custom_apiKey ? { borderColor: 'rgba(239, 68, 68, 0.6)' } : {}),
                      },
                      onChange: e => onApiKeyChange(e.target.value),
                    }),
                    errors.custom_apiKey && t('p', { className: 'mt-1.5 text-xs text-rose-300 text-left' }, errors.custom_apiKey)
                  ),
                  t('button', {
                    type: 'button',
                    className: 'custom-action-btn',
                    disabled: keyValidating || !customConfig.apiKey?.trim() || !customConfig.endpoint?.trim(),
                    onClick: validateKey,
                  },
                    keyValidating
                      ? t('span', { className: 'spin inline-block w-3.5 h-3.5 rounded-full border-2 border-teal-300/30 border-t-teal-300' })
                      : t(Icons.CheckCircle, { size: 13 }),
                    'Test Key'
                  )
                ),
                validateMsg && t('p', {
                  className: validateMsg.ok ? 'custom-status-ok' : 'custom-status-err',
                  style: { marginTop: '6px', display: 'flex', alignItems: 'center', gap: '5px' }
                },
                  validateMsg.ok ? t(Icons.CheckCircle, { size: 12 }) : t(Icons.XCircle, { size: 12 }),
                  validateMsg.text
                )
              ),
              t('div', null,
                t('label', null, 'Model Name'),
                t('input', {
                  type: 'text',
                  placeholder: 'e.g. llama-3.3-70b-versatile',
                  value: customConfig.modelName,
                  style: errors.custom_modelName ? { borderColor: 'rgba(239, 68, 68, 0.6)' } : {},
                  onChange: e => {
                    setCustomConfig(p => ({ ...p, modelName: e.target.value }));
                    if (errors.custom_modelName) setErrors(err => ({ ...err, custom_modelName: undefined }));
                  },
                }),
                errors.custom_modelName && t('p', { className: 'mt-1.5 text-xs text-rose-300 text-left' }, errors.custom_modelName)
              ),
              t('div', { style: { display: 'flex', justifyContent: 'flex-end' } },
                t('button', {
                  type: 'button',
                  className: 'custom-action-btn',
                  disabled: fetchingModels || !customConfig.apiKey?.trim() || !customConfig.endpoint?.trim(),
                  onClick: fetchModels,
                },
                  fetchingModels
                    ? t('span', { className: 'spin inline-block w-3.5 h-3.5 rounded-full border-2 border-teal-300/30 border-t-teal-300' })
                    : t(Icons.RefreshCw, { size: 13 }),
                  fetchingModels ? 'Fetching…' : 'Fetch Models (optional)'
                )
              ),
              fetchMsg && t('p', {
                className: fetchMsg.ok ? 'custom-status-ok' : 'custom-status-err',
                style: { display: 'flex', alignItems: 'center', gap: '5px' }
              },
                fetchMsg.ok ? t(Icons.CheckCircle, { size: 12 }) : t(Icons.XCircle, { size: 12 }),
                fetchMsg.text
              ),
              (customConfig.models || []).length > 0 && t('div', null,
                t('label', null, 'Or pick from fetched list'),
                t('select', {
                  value: customConfig.modelName || '',
                  onChange: e => {
                    setCustomConfig(p => ({ ...p, modelName: e.target.value }));
                    if (errors.custom_modelName) setErrors(err => ({ ...err, custom_modelName: undefined }));
                  },
                },
                  t('option', { value: '' }, 'Choose a model…'),
                  customConfig.models.map(m => t('option', { key: m, value: m }, m))
                )
              )
            )
      );
    }

    // ── Model Selection List ─────────────────────────────────────────────────
        function ModelList({ activeModel, setActiveModel, customConfig, setCustomConfig, errors = {}, setErrors = () => {} }) {
      return t('div', { className: 'model-list' },
        MODELS.map(model => {
          const active = model.id === activeModel.id;
          const IconComp = Icons[model.icon];
          const isCustom = model.id === 'custom';

          return t('div', {
            key: model.id,
            className: `model-card${active ? ' active' : ''}`,
            style: { display: 'flex', flexDirection: 'column', alignItems: 'stretch' },
          },
            // Top row: clickable to select
            t('div', {
              role: 'button',
              tabIndex: 0,
              onClick: () => setActiveModel(model),
              onKeyDown: e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setActiveModel(model); } },
              style: { display: 'flex', flexDirection: 'column', width: '100%', cursor: 'pointer' },
            },
            // Top row: num + icon + body + badge + check
            t('div', { style: { display: 'flex', alignItems: 'center', gap: '14px', width: '100%' } },
              // Number
              t('div', { className: 'model-num' }, model.num),

              // Icon
              t('div', { className: 'model-icon-wrap', style: { background: model.iconBg } },
                t(IconComp, { size: 20, style: { color: model.iconColor } })
              ),

              // Name + stats
              t('div', { className: 'model-body' },
                t('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
                  t('span', { style: { fontSize: '14px', fontWeight: '600', color: '#f1f5f9', lineHeight: '1.2' } }, model.name),
                  t('span', { style: { fontSize: '11px', color: '#475569', fontWeight: '500' } }, model.model),
                ),
                t('div', { style: { display: 'flex', gap: '12px', marginTop: '5px', flexWrap: 'wrap' } },
                  model.stats.map((stat, i) => {
                    const StatIcon = Icons[stat.icon];
                    return t('div', { key: i, className: 'model-stat' },
                      t(StatIcon, { size: 11 }),
                      t('span', null, stat.label)
                    );
                  })
                )
              ),

              // Badge + check
              t('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', flexShrink: 0 } },
                t('span', {
                  className: 'model-card-badge',
                  style: { background: model.badgeBg, color: model.badgeColor }
                }, model.badge),
                t('div', { className: 'model-card-check' },
                  t(Icons.Check, { size: 11, className: 'text-white' })
                )
              )
            ),

            // Description (shown always, below the row)
            t('p', { style: { fontSize: '12px', color: '#64748b', lineHeight: '1.6', marginTop: '10px', paddingLeft: '102px', textAlign: 'left' } },
              model.description
            )
            ),

            // Custom API fields — shown only when this card is active
            isCustom && active && t(CustomConfigPanel, {
              customConfig,
              setCustomConfig,
              errors,
              setErrors,
            })
          );
        })
      );
    }

    // ── Input field helpers ─────────────────────────────────────────────────
    function Field({ label, error, children }) {
      return t('div', null,
        t('label', { className: 'block text-sm font-medium text-slate-300 mb-2' }, label),
        children,
        error && t('p', { className: 'mt-1.5 text-xs text-rose-300' }, error)
      );
    }

    function Input({ value, onChange, type = 'number', placeholder, min, max, step, error }) {
      return t('input', {
        type, value, placeholder, min, max, step,
        onChange: e => onChange(e.target.value),
        className: `field-focus w-full rounded-2xl border ${error ? 'border-rose-500/60' : 'border-slate-700'} bg-slate-900/95 px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 transition`,
      });
    }

    function Select({ value, onChange, options, error }) {
      return t('select', {
        value,
        onChange: e => onChange(e.target.value),
        className: `field-focus w-full rounded-2xl border ${error ? 'border-rose-500/60' : 'border-slate-700'} bg-slate-900/95 px-4 py-3 text-sm text-slate-100 transition`,
      }, ...options.map(([val, label]) => t('option', { key: val, value: val }, label)));
    }

    // ── Result rendering ────────────────────────────────────────────────────
    function ResultPanel({ response, responseTime, activeModel, onRetry, error }) {
      const [classifierOpen, setClassifierOpen] = useState(false);

      if (error) return t('div', { className: 'mt-6 rounded-2xl border border-red-500/20 bg-red-500/10 p-5 fade-slide' },
        t('div', { className: 'flex items-start gap-3' },
          t(Icons.AlertTriangle, { size: 18, className: 'text-red-400 mt-0.5 shrink-0' }),
          t('div', null,
            t('p', { className: 'font-semibold text-red-100' }, 'Diagnosis failed'),
            t('p', { className: 'mt-1 text-sm text-red-100/80 leading-6' }, error)
          )
        ),
        t('button', { type: 'button', onClick: onRetry, className: 'mt-4 rounded-full bg-red-500 px-4 py-2 text-sm font-semibold text-white hover:bg-red-400 transition' }, 'Retry')
      );

      if (!response) return null;

      const diagnosis = response.diagnosis || {};
      const conditionName = diagnosis.name || 'Clinical diagnosis';
      const icd10 = diagnosis.icd10 || '';
      const medicines = response.medicines || [];
      const differentials = response.differential_diagnoses || [];
      const classifier = response.classifier_output || [];
      const action = getActionBadge(response.action);
      const critical = response.critical_alert || { flag: false, reasons: [] };
      const rawConf = response.confidence != null ? Number(response.confidence) : 0;
      const confidence = rawConf <= 1 ? rawConf * 100 : rawConf;
      const confColor = confidence > 80 ? 'bg-emerald-400' : confidence >= 60 ? 'bg-amber-400' : 'bg-red-500';
      const IconComp = Icons[activeModel.icon];

      return t('div', { className: 'space-y-4 mt-6 fade-slide' },
        critical.flag && t('div', { className: 'rounded-2xl border border-red-500/25 bg-red-500/10 p-4' },
          t('div', { className: 'flex items-center gap-2 text-sm font-semibold text-red-200' },
            t(Icons.AlertCircle, { size: 16, className: 'text-red-400' }),
            'Critical Alert'
          ),
          t('ul', { className: 'mt-2 space-y-1 text-sm text-red-100/80 pl-6 list-disc' },
            critical.reasons.map((r, i) => t('li', { key: i }, r))
          )
        ),
        t('div', { className: 'rounded-2xl border border-slate-700/80 bg-slate-900/90 p-6' },
          t('div', { className: 'flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between' },
            t('div', null,
              t('div', { className: 'flex flex-wrap items-center gap-2' },
                t('h2', { className: 'text-xl font-semibold text-white' }, conditionName),
                icd10 && t('span', { className: 'rounded-full bg-teal-600/15 px-3 py-1 text-xs font-semibold uppercase tracking-widest text-teal-300' }, icd10)
              ),
              t('div', { className: 'mt-4 flex items-center gap-3' },
                t('span', { className: 'text-xs text-slate-500 shrink-0' }, 'Confidence'),
                t('div', { className: 'flex-1 h-2 rounded-full bg-slate-800 overflow-hidden' },
                  t('div', { className: `h-full rounded-full transition-all ${confColor}`, style: { width: `${Math.min(confidence, 100)}%` } })
                ),
                t('span', { className: 'text-sm font-semibold text-slate-200 shrink-0' }, `${confidence.toFixed(0)}%`)
              )
            ),
            t('div', { className: 'flex items-center gap-2 rounded-2xl bg-slate-800/80 px-4 py-3 text-xs text-slate-400 shrink-0' },
              t(IconComp, { size: 14, style: { color: activeModel.iconColor } }),
              t('span', null, `${activeModel.name} • ${responseTime}s`)
            )
          )
        ),
        t('div', { className: 'grid gap-4 lg:grid-cols-2' },
          t('div', { className: 'rounded-2xl border border-slate-700/80 bg-slate-900/90 p-5' },
            t('div', { className: 'flex items-center gap-2 text-sm font-semibold text-slate-100 mb-4' },
              t(Icons.Pill, { size: 16, className: 'text-teal-300' }),
              'Recommended Medicines'
            ),
            medicines.length === 0
              ? t('p', { className: 'text-sm text-slate-500' }, 'No medicines suggested.')
              : t('div', { className: 'space-y-3' },
                  medicines.map((med, i) => t('div', { key: i, className: 'rounded-xl border border-slate-700/60 bg-slate-950/70 p-4' },
                    t('div', { className: 'flex items-start justify-between gap-2' },
                      t('div', null,
                        t('div', { className: 'text-sm font-semibold text-white' }, med.name || 'Unknown'),
                        med.dosage_form && t('div', { className: 'text-xs text-slate-500 mt-0.5' }, med.dosage_form)
                      ),
                      t('span', { className: 'rounded-full bg-emerald-500/10 px-2.5 py-1 text-[10px] font-semibold uppercase tracking-wider text-emerald-300 shrink-0' }, 'Verified')
                    ),
                    med.dose_instruction && t('p', { className: 'mt-2.5 text-xs leading-5 text-slate-300' }, med.dose_instruction),
                    med.citation && t('div', { className: 'mt-2 text-[10px] text-slate-600' }, med.citation)
                  ))
                )
          ),
          t('div', { className: 'space-y-4' },
            t('div', { className: 'rounded-2xl border border-slate-700/80 bg-slate-900/90 p-5' },
              t('div', { className: 'flex items-center gap-2 text-sm font-semibold text-slate-100 mb-3' },
                t(Icons.ListChecks, { size: 16, className: 'text-teal-300' }),
                'Differential Diagnoses'
              ),
              t('div', { className: 'flex flex-wrap gap-2' },
                differentials.length === 0
                  ? t('span', { className: 'text-sm text-slate-500' }, 'None listed.')
                  : differentials.map((d, i) =>
                      t('span', { key: i, className: 'rounded-full bg-slate-800 px-3 py-1.5 text-xs text-slate-300' },
                        typeof d === 'object' ? `${d.name}${d.icd10 ? ` (${d.icd10})` : ''}` : d
                      )
                    )
              )
            ),
            t('div', { className: 'rounded-2xl border border-slate-700/80 bg-slate-900/90 p-5' },
              t('div', { className: 'flex items-center justify-between gap-3 mb-3' },
                t('div', { className: 'flex items-center gap-2 text-sm font-semibold text-slate-100' },
                  t(Icons.ArrowRight, { size: 16, className: 'text-teal-300' }),
                  'Action'
                ),
                t('span', { className: `rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-wider ${action.color}` }, action.label)
              ),
              response.refer_to_specialist && t('div', { className: 'rounded-xl bg-amber-500/10 border border-amber-500/20 p-3 text-xs text-amber-100 leading-5' },
                response.refer_reason || 'Referral recommended based on clinical risk factors.'
              )
            )
          )
        ),
        t('div', { className: 'rounded-2xl border border-slate-700/80 bg-slate-900/90 p-5' },
          t('button', {
            type: 'button',
            onClick: () => setClassifierOpen(p => !p),
            className: 'flex w-full items-center justify-between text-sm font-semibold text-slate-100'
          },
            t('div', { className: 'flex items-center gap-2' },
              t(Icons.Cpu, { size: 16, className: 'text-teal-300' }),
              'ML Classifier Signal'
            ),
            t(classifierOpen ? Icons.ChevronUp : Icons.ChevronDown, { size: 16, className: 'text-slate-400' })
          ),
          classifierOpen && t('div', { className: 'mt-4 space-y-3' },
            classifier.slice(0, 5).map((item, i) => {
              const pct = Math.min(100, Number(item.probability || 0) * 100);
              return t('div', { key: i },
                t('div', { className: 'flex items-center justify-between text-xs text-slate-400 mb-1.5' },
                  t('span', null, item.label || 'Unknown'),
                  t('span', null, `${pct.toFixed(0)}%`)
                ),
                t('div', { className: 'h-1.5 rounded-full bg-slate-800 overflow-hidden' },
                  t('div', { className: 'h-full rounded-full bg-teal-500 transition-all', style: { width: `${pct}%` } })
                )
              );
            })
          )
        ),
        t('div', { className: 'rounded-2xl border border-slate-700/80 bg-slate-900/90 p-5' },
          t('div', { className: 'flex items-center gap-2 text-sm font-semibold text-slate-100 mb-3' },
            t(Icons.FileText, { size: 16, className: 'text-teal-300' }),
            'Clinical Reasoning'
          ),
          t('p', { className: 'text-sm leading-7 text-slate-300 italic' }, response.llm_reasoning || response.reasoning || 'No reasoning returned.')
        )
      );
    }

    // ── Main App ────────────────────────────────────────────────────────────
    function App() {
      const [activeModel, setActiveModel] = useState(MODELS[0]);
      const [form, setForm] = useState(defaultForm);
      const [errors, setErrors] = useState({});
      const [response, setResponse] = useState(null);
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);
      const [responseTime, setResponseTime] = useState(null);
      const [selectedSample, setSelectedSample] = useState(0);
      const [customConfig, setCustomConfig] = useState(defaultCustom);

      useEffect(() => { setError(null); }, [activeModel]);

      function updateField(field, value) {
        setForm(prev => ({ ...prev, [field]: value }));
        setErrors(prev => ({ ...prev, [field]: undefined }));
      }

      function loadSample() {
        const entry = SAMPLE_PATIENTS[Number(selectedSample)] || SAMPLE_PATIENTS[0];
        setForm(entry.patient);
        setErrors({});
        setResponse(null);
        setError(null);
      }

      async function submitDiagnosis() {
        let validation = validate(form);
        if (activeModel.id === 'custom') {
          const endpoint = customConfig.mode === 'guided'
            ? (customConfig.endpoint || PROVIDERS.find(p => p.id === customConfig.provider)?.baseUrl)
            : customConfig.endpoint;
          if (!endpoint || !endpoint.trim()) {
            validation.custom_endpoint = 'Base URL is required.';
          }
          if (!customConfig.apiKey || !customConfig.apiKey.trim()) {
            validation.custom_apiKey = 'API key is required.';
          }
          if (!customConfig.modelName || !customConfig.modelName.trim()) {
            validation.custom_modelName = 'Model is required.';
          }
        }
        if (Object.keys(validation).length) { setErrors(validation); return; }
        setLoading(true); setError(null); setResponse(null); setResponseTime(null);
        const payload = {
          age: Number(form.age),
          sex: form.sex === 'Female' ? 'F' : 'M',
          bp_systolic: Number(form.bp_systolic),
          bp_diastolic: Number(form.bp_diastolic),
          blood_sugar: form.blood_sugar === '' ? null : Number(form.blood_sugar),
          blood_sugar_context: form.blood_sugar_context,
          weight_kg: form.weight_kg === '' ? null : Number(form.weight_kg),
          height_cm: form.height_cm === '' ? null : Number(form.height_cm),
          temperature_c: form.temperature_c === '' ? null : Number(form.temperature_c),
          pulse_bpm: form.pulse_bpm === '' ? null : Number(form.pulse_bpm),
          chief_complaint: form.chief_complaint,
          llm_backend: activeModel.id,
          ...(activeModel.id === 'custom' ? {
            custom_config: {
              endpoint: normalizeBaseUrl(
                customConfig.mode === 'guided'
                  ? (customConfig.endpoint || PROVIDERS.find(p => p.id === customConfig.provider)?.baseUrl)
                  : customConfig.endpoint
              ),
              apiKey: customConfig.apiKey.trim(),
              modelName: customConfig.modelName.trim(),
              provider: customConfig.provider,
              mode: customConfig.mode,
            },
          } : {}),
        };
        const start = performance.now();
        try {
          const res = await fetch('http://localhost:8000/diagnose', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const text = await res.text();
          const duration = ((performance.now() - start) / 1000).toFixed(2);
          setResponseTime(duration);
          if (!res.ok) throw new Error(text || res.statusText);
          setResponse(JSON.parse(text));
        } catch (err) {
          setError(
            err.message.includes('Failed to fetch')
              ? 'Unable to connect. Make sure the API server is running:\n  python api_server.py'
              : err.message
          );
        } finally {
          setLoading(false);
        }
      }

      const IconComp = Icons[activeModel.icon];

      return t('div', { className: 'min-h-screen py-10 px-4 sm:px-6', style: { background: 'radial-gradient(circle at top, rgba(13,148,136,0.13), transparent 35%), radial-gradient(circle at bottom right, rgba(56,189,248,0.07), transparent 30%), #0f172a' } },
        t('div', { className: 'mx-auto max-w-3xl space-y-6' },

          t('div', { className: 'rounded-2xl border border-slate-700/80 bg-slate-950/95 p-6 sm:p-8' },
            t('div', { className: 'flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between' },
              t('div', null,
                t('p', { className: 'text-xs uppercase tracking-[0.3em] text-teal-400' }, 'Clinical Decision Support'),
                t('h1', { className: 'mt-2 text-2xl font-bold text-white sm:text-3xl' }, 'Hospitrax AI Triage'),
                t('p', { className: 'mt-2 text-sm text-slate-400 max-w-lg' }, 'Select an AI backend, enter patient data, and run a clinical decision support analysis.')
              ),
              t('div', { className: 'flex items-center gap-2 shrink-0' },
                t('select', {
                  value: selectedSample,
                  onChange: e => setSelectedSample(Number(e.target.value)),
                  className: 'field-focus rounded-xl border border-slate-700 bg-slate-900 px-3 py-2.5 text-sm text-slate-100 max-w-[180px]',
                },
                  SAMPLE_PATIENTS.map((s, i) => t('option', { key: i, value: i }, s.label))
                ),
                t('button', {
                  type: 'button', onClick: loadSample,
                  className: 'rounded-xl border border-slate-700 bg-slate-900 px-4 py-2.5 text-sm font-medium text-slate-100 hover:border-teal-400/60 hover:bg-slate-800 transition whitespace-nowrap'
                }, 'Load Sample')
              )
            ),

            // ── Model selection list ──────────────────────────────────────
            t('div', { className: 'mt-7' },
              t('p', { className: 'text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 mb-4' }, 'Select AI Backend'),
              t(ModelList, { activeModel, setActiveModel, customConfig, setCustomConfig, errors, setErrors })
            ),

            // ── Patient input form ────────────────────────────────────────
            t('div', { className: 'mt-8 border-t border-slate-800 pt-7' },
              t('p', { className: 'text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 mb-5' }, 'Patient Data'),

              t('div', { className: 'grid gap-4 sm:grid-cols-2' },
                t(Field, { label: 'Age', error: errors.age },
                  t(Input, { value: form.age, onChange: v => updateField('age', v), placeholder: '28', min: 1, max: 120, error: errors.age })
                ),
                t(Field, { label: 'Sex', error: errors.sex },
                  t(Select, {
                    value: form.sex, onChange: v => updateField('sex', v), error: errors.sex,
                    options: [['', 'Select sex'], ['Male', 'Male'], ['Female', 'Female']]
                  })
                )
              ),

              t('div', { className: 'mt-4' },
                t(Field, { label: 'Chief Complaint', error: errors.chief_complaint },
                  t('div', null,
                    t('textarea', {
                      rows: 3, maxLength: 280,
                      value: form.chief_complaint,
                      onChange: e => updateField('chief_complaint', e.target.value),
                      className: `field-focus w-full rounded-2xl border ${errors.chief_complaint ? 'border-rose-500/60' : 'border-slate-700'} bg-slate-900/95 px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 transition`,
                      placeholder: 'Describe the primary symptoms and clinical context',
                    }),
                    t('div', { className: 'flex justify-between text-xs text-slate-600 mt-1.5' },
                      t('span', null, errors.chief_complaint || ''),
                      t('span', null, `${form.chief_complaint.length}/280`)
                    )
                  )
                )
              ),

              t('div', { className: 'mt-4 grid gap-4 sm:grid-cols-2' },
                t(Field, { label: 'BP Systolic (mmHg)', error: errors.bp_systolic },
                  t(Input, { value: form.bp_systolic, onChange: v => updateField('bp_systolic', v), placeholder: '120', min: 50, max: 300, error: errors.bp_systolic })
                ),
                t(Field, { label: 'BP Diastolic (mmHg)', error: errors.bp_diastolic },
                  t(Input, { value: form.bp_diastolic, onChange: v => updateField('bp_diastolic', v), placeholder: '80', min: 30, max: 200, error: errors.bp_diastolic })
                )
              ),

              t('div', { className: 'mt-4 grid gap-4 sm:grid-cols-2' },
                t(Field, { label: 'Blood Sugar (mg/dL)', error: errors.blood_sugar },
                  t(Input, { value: form.blood_sugar, onChange: v => updateField('blood_sugar', v), placeholder: '95', min: 20, max: 600, error: errors.blood_sugar })
                ),
                t(Field, { label: 'Blood Sugar Context' },
                  t(Select, {
                    value: form.blood_sugar_context, onChange: v => updateField('blood_sugar_context', v),
                    options: [['random', 'Random'], ['fasting', 'Fasting'], ['post-meal', 'Post-meal']]
                  })
                )
              ),

              t('div', { className: 'mt-4 grid gap-4 sm:grid-cols-2' },
                t(Field, { label: 'Weight (kg)' },
                  t(Input, { value: form.weight_kg, onChange: v => updateField('weight_kg', v), placeholder: '70', min: 1 })
                ),
                t(Field, { label: 'Height (cm)' },
                  t(Input, { value: form.height_cm, onChange: v => updateField('height_cm', v), placeholder: '170', min: 30 })
                )
              ),

              t('div', { className: 'mt-4 grid gap-4 sm:grid-cols-2' },
                t(Field, { label: 'Temperature (°C)', error: errors.temperature_c },
                  t(Input, { value: form.temperature_c, onChange: v => updateField('temperature_c', v), placeholder: '37.0', min: 30, max: 45, step: '0.1', error: errors.temperature_c })
                ),
                t(Field, { label: 'Pulse (bpm)', error: errors.pulse_bpm },
                  t(Input, { value: form.pulse_bpm, onChange: v => updateField('pulse_bpm', v), placeholder: '80', min: 20, max: 250, error: errors.pulse_bpm })
                )
              ),

              t('div', { className: 'mt-7' },
                t('button', {
                  type: 'button',
                  onClick: submitDiagnosis,
                  disabled: loading,
                  className: 'w-full flex items-center justify-center gap-3 rounded-2xl py-4 text-sm font-semibold text-white transition disabled:opacity-60 disabled:cursor-not-allowed',
                  style: { background: loading ? '#0f766e' : `linear-gradient(135deg, #0d9488, #0369a1)`, boxShadow: loading ? 'none' : '0 4px 24px rgba(13,148,136,0.25)' }
                },
                  loading
                    ? t('span', { className: 'spin inline-block w-5 h-5 rounded-full border-2 border-white/30 border-t-white' })
                    : t(IconComp, { size: 18, style: { color: activeModel.iconColor } }),
                  t('span', null, loading ? 'Running diagnosis…' : `Run with ${activeModel.name} →`)
                )
              )
            ),

            t(ResultPanel, { response, responseTime, activeModel, error, onRetry: submitDiagnosis })
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(t(App));
  </script>
</body>
</html>
