<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical Decision Support | Hospitrax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
    }
    .card-glow {
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
    }
    .fade-slide {
      animation: fadeSlide 0.45s ease forwards;
      opacity: 0;
      transform: translateY(16px);
    }
    @keyframes fadeSlide {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .scrollbar-thin::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: rgba(15, 23, 42, 0.55);
      border-radius: 999px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: transparent;
    }
    .field-focus:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>
  <script>
    const { useState, useEffect } = React;
    const t = React.createElement;

    const iconPaths = {
      Zap: 'M13 2L3 14h7l-1 8 10-12h-7l1-8z',
      Flame: 'M12 2C8 6.5 8 11 12 14.5c4-3.5 4-8 0-12.5z',
      Sparkles: 'M12 2.5l1.6 4.9 5.1.7-3.9 3.8.9 5.1-4.7-2.5-4.7 2.5.9-5.1-3.9-3.8 5.1-.7L12 2.5z',
      AlertCircle: 'M12 8v5m0 4h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z',
      Pill: 'M9 14.5l6-6m1.4-1.4a3 3 0 0 1 4.3 4.3l-7.4 7.4a3 3 0 0 1 4.3 0l-7.4-7.4a3 3 0 0 1 4.3-4.3l1.4 1.4',
      ListChecks: 'M9 12l2 2 4-4M4 6h16M4 12h3M4 18h3',
      ArrowRightCircle: 'M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zm-1-7l4-4-4-4m-4 4h8',
      Cpu: 'M9 4h6v2H9V4zm-4 8h2v2H5v-2zm14 0h2v2h-2v-2zm-2 10h2v-2h-2v2zm-8 0h2v-2H9v2zm-9-9h2v2H0v-2zm17 0h2v2h-2v-2z',
      ChevronUp: 'M18 15l-6-6-6 6',
      AlertTriangle: 'M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01',
      ChevronDown: 'M6 9l6 6 6-6',
      FileText: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zm-2 0v6h6',
    };

    function Icon({ name, className = '', size = 18, ...props }) {
      const path = iconPaths[name];
      if (!path) return null;
      return t('svg', {
        xmlns: 'http://www.w3.org/2000/svg',
        viewBox: '0 0 24 24',
        fill: 'none',
        stroke: 'currentColor',
        strokeWidth: 2,
        strokeLinecap: 'round',
        strokeLinejoin: 'round',
        className,
        width: size,
        height: size,
        ...props
      }, t('path', { d: path }));
    }

    const tabs = [
      { id: 'groq', title: 'Groq Cloud', subtitle: '~1-2s • Llama 3.3 70B', icon: 'Zap', label: 'Groq Cloud' },
      { id: 'ollama', title: 'Ollama Mistral', subtitle: '~200s • Offline', icon: 'Flame', label: 'Ollama Mistral' },
      { id: 'medgemma', title: 'MedGemma', subtitle: '~20-50s • Fine-tuned', icon: 'Sparkles', label: 'MedGemma' }
    ];

    const SAMPLE_PATIENTS = [
      {
        label: 'Iron-deficiency anaemia (likely)',
        patient: {
          age: '28', sex: 'Female', chief_complaint: 'Fatigue, weakness, pale skin, dizziness on standing, heavy periods', bp_systolic: '100', bp_diastolic: '65', blood_sugar: '85', blood_sugar_context: 'fasting', weight_kg: '50', height_cm: '155', temperature_c: '36.8', pulse_bpm: '105'
        }
      },
      {
        label: 'Hypertensive crisis (urgent)',
        patient: {
          age: '60', sex: 'Male', chief_complaint: 'Severe headache, blurred vision, chest discomfort', bp_systolic: '188', bp_diastolic: '124', blood_sugar: '110', blood_sugar_context: 'random', weight_kg: '82', height_cm: '172', temperature_c: '36.9', pulse_bpm: '90'
        }
      },
      {
        label: 'Type 2 Diabetes suspicious',
        patient: {
          age: '50', sex: 'Male', chief_complaint: 'Increased thirst, frequent urination, fatigue', bp_systolic: '128', bp_diastolic: '82', blood_sugar: '215', blood_sugar_context: 'random', weight_kg: '90', height_cm: '170', temperature_c: '37.0', pulse_bpm: '84'
        }
      },
      {
        label: 'Community-acquired pneumonia',
        patient: {
          age: '45', sex: 'Female', chief_complaint: 'Fever, productive cough, shortness of breath', bp_systolic: '118', bp_diastolic: '76', blood_sugar: '98', blood_sugar_context: 'random', weight_kg: '68', height_cm: '162', temperature_c: '38.9', pulse_bpm: '110'
        }
      },
      {
        label: 'Acute gastroenteritis',
        patient: {
          age: '22', sex: 'Male', chief_complaint: 'Watery diarrhea, vomiting, abdominal cramps', bp_systolic: '105', bp_diastolic: '65', blood_sugar: '90', blood_sugar_context: 'random', weight_kg: '60', height_cm: '175', temperature_c: '37.5', pulse_bpm: '98'
        }
      },
      {
        label: 'Uncomplicated UTI',
        patient: {
          age: '30', sex: 'Female', chief_complaint: 'Dysuria, frequency, low abdominal discomfort', bp_systolic: '112', bp_diastolic: '70', blood_sugar: '88', blood_sugar_context: 'random', weight_kg: '58', height_cm: '160', temperature_c: '36.7', pulse_bpm: '76'
        }
      },
      {
        label: 'Asthma exacerbation (mild)',
        patient: {
          age: '35', sex: 'Male', chief_complaint: 'Wheezing, shortness of breath, cough at night', bp_systolic: '120', bp_diastolic: '78', blood_sugar: '95', blood_sugar_context: 'random', weight_kg: '75', height_cm: '178', temperature_c: '36.6', pulse_bpm: '100'
        }
      }
    ];

    const defaultForm = {
      age: '', sex: '', chief_complaint: '', bp_systolic: '', bp_diastolic: '',
      blood_sugar: '', blood_sugar_context: 'random', weight_kg: '', height_cm: '',
      temperature_c: '', pulse_bpm: ''
    };

    function getActionBadge(action) {
      switch (action) {
        case 'full_recommendation': return { label: 'Full Recommendation', color: 'bg-emerald-500/10 text-emerald-300' };
        case 'diagnosis_only': return { label: 'Diagnosis Only', color: 'bg-amber-500/10 text-amber-300' };
        case 'refer': return { label: 'Refer to Specialist', color: 'bg-red-500/10 text-red-300' };
        default: return { label: action || 'Unknown', color: 'bg-slate-700 text-slate-200' };
      }
    }

    function validate(form) {
      const errors = {};
      if (!form.age) errors.age = 'Required.';
      else if (!(form.age >= 1 && form.age <= 120)) errors.age = 'Age must be 1–120.';
      if (!form.sex) errors.sex = 'Required.';
      if (!form.chief_complaint) errors.chief_complaint = 'Required.';
      if (!form.bp_systolic) errors.bp_systolic = 'Required.';
      else if (!(form.bp_systolic >= 50 && form.bp_systolic <= 300)) errors.bp_systolic = '50–300 mmHg.';
      if (!form.bp_diastolic) errors.bp_diastolic = 'Required.';
      else if (!(form.bp_diastolic >= 30 && form.bp_diastolic <= 200)) errors.bp_diastolic = '30–200 mmHg.';
      if (form.blood_sugar !== '' && !(form.blood_sugar >= 20 && form.blood_sugar <= 600)) errors.blood_sugar = '20–600 mg/dL.';
      if (form.temperature_c !== '' && !(form.temperature_c >= 30 && form.temperature_c <= 45)) errors.temperature_c = '30–45 °C.';
      if (form.pulse_bpm !== '' && !(form.pulse_bpm >= 20 && form.pulse_bpm <= 250)) errors.pulse_bpm = '20–250 bpm.';
      return errors;
    }

    function formatCitation(citation) {
      if (!citation) return 'Unknown';
      return citation.toLowerCase().includes('tier 1') || citation.toLowerCase().includes('tier 2')
        ? 'WHO EML + NEML'
        : citation;
    }

    function App() {
      const [activeTab, setActiveTab] = useState(tabs[0]);
      const [form, setForm] = useState(defaultForm);
      const [errors, setErrors] = useState({});
      const [response, setResponse] = useState(null);
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);
      const [responseTime, setResponseTime] = useState(null);
      const [classifierOpen, setClassifierOpen] = useState(false);
      const [selectedSample, setSelectedSample] = useState(0);

      useEffect(() => {
        setError(null);
      }, [activeTab]);

      function updateField(field, value) {
        setForm(prev => ({ ...prev, [field]: value }));
        setErrors(prev => ({ ...prev, [field]: undefined }));
      }

      function loadSample() {
        const idx = Number(selectedSample) || 0;
        const entry = SAMPLE_PATIENTS[idx] || SAMPLE_PATIENTS[0];
        setForm(entry.patient);
        setErrors({});
        setResponse(null);
        setError(null);
      }

      async function submitDiagnosis() {
        const validation = validate(form);
        if (Object.keys(validation).length) {
          setErrors(validation);
          setResponse(null);
          return;
        }
        setLoading(true);
        setError(null);
        setResponse(null);
        setResponseTime(null);
        const payload = {
          age: Number(form.age),
          sex: form.sex === 'Female' ? 'F' : 'M',
          bp_systolic: Number(form.bp_systolic),
          bp_diastolic: Number(form.bp_diastolic),
          blood_sugar: form.blood_sugar === '' ? null : Number(form.blood_sugar),
          blood_sugar_context: form.blood_sugar_context,
          weight_kg: form.weight_kg === '' ? null : Number(form.weight_kg),
          height_cm: form.height_cm === '' ? null : Number(form.height_cm),
          temperature_c: form.temperature_c === '' ? null : Number(form.temperature_c),
          pulse_bpm: form.pulse_bpm === '' ? null : Number(form.pulse_bpm),
          chief_complaint: form.chief_complaint,
          llm_backend: activeTab.id,
        };
        const start = performance.now();

        try {
          const result = await fetch('http://localhost:8000/diagnose', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const text = await result.text();
          const duration = ((performance.now() - start) / 1000).toFixed(2);
          setResponseTime(duration);
          if (!result.ok) {
            throw new Error(text || result.statusText || 'Unexpected API response');
          }
          const json = JSON.parse(text);
          setResponse(json);
          setError(null);
          setClassifierOpen(false);
        } catch (err) {
          const message = err.message.includes('Failed to fetch')
            ? 'Unable to connect. Make sure the API server is running: python api_server.py'
            : err.message;
          setError(message);
        } finally {
          setLoading(false);
        }
      }

      function renderTab(tab) {
        const active = tab.id === activeTab.id;
        return t('button', {
          key: tab.id,
          type: 'button',
          onClick: () => setActiveTab(tab),
          className: `relative flex-1 min-w-0 rounded-3xl border transition-all duration-250 text-left px-5 py-4 ${active ? 'bg-teal-600 text-white shadow-teal-500/20 border-teal-500/20' : 'bg-slate-800/75 text-slate-300 border-slate-700 hover:border-slate-500'}`
        },
          t('div', { className: 'flex items-center gap-3' },
            t(Icon, { name: tab.icon, className: `w-5 h-5 ${active ? 'text-white' : 'text-slate-300'}` }),
            t('div', null,
              t('div', { className: 'font-semibold text-sm' }, tab.title),
              t('div', { className: `mt-1 text-xs ${active ? 'text-slate-200' : 'text-slate-400'}` }, tab.subtitle)
            )
          )
        );
      }

      function renderErrorCard() {
        return t('div', { className: 'mt-6 rounded-3xl border border-red-500/20 bg-red-500/10 p-5 shadow-lg animate-fadeSlide' },
          t('div', { className: 'flex items-start gap-3' },
            t(Icon, { name: 'AlertTriangle', className: 'w-5 h-5 text-red-400 mt-0.5' }),
            t('div', null,
              t('p', { className: 'font-semibold text-red-100' }, 'Diagnosis failed'),
              t('p', { className: 'mt-1 text-sm text-red-100/80 leading-6' }, error)
            )
          ),
          t('button', {
            type: 'button',
            onClick: submitDiagnosis,
            className: 'mt-4 inline-flex items-center justify-center rounded-full bg-red-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-red-400'
          }, 'Retry')
        );
      }

      function renderResponse() {
        if (!response) return null;
        const diagnosis = response.diagnosis || {};
        const conditionName = diagnosis.name || diagnosis.condition || 'Clinical diagnosis';
        const icd10 = diagnosis.icd10 || response.icd10 || '';
        const medicines = response.medicines || [];
        const differentials = response.differential_diagnoses || [];
        const classifier = response.classifier_output || [];
        const action = getActionBadge(response.action);
        const critical = response.critical_alert || { flag: false, reasons: [] };
        const rawConfidence = response.confidence != null ? Number(response.confidence) : Number(diagnosis.confidence || 0);
        const confidence = rawConfidence <= 1 ? rawConfidence * 100 : rawConfidence;
        const confidenceColor = confidence > 80 ? 'bg-emerald-400' : confidence >= 60 ? 'bg-amber-400' : 'bg-red-500';

        return t('div', { className: 'space-y-5 mt-6 fade-slide' },
          critical.flag && t('div', { className: 'rounded-3xl border border-red-500/20 bg-red-500/10 p-5' },
            t('div', { className: 'flex items-center gap-3' },
              t(Icon, { name: 'AlertCircle', className: 'w-5 h-5 text-red-300' }),
              t('div', { className: 'text-sm font-semibold text-red-100' }, 'Critical alert')
            ),
            t('div', { className: 'mt-3 text-sm text-red-100/90 space-y-2' },
              critical.reasons.map((reason, idx) => t('p', { key: idx }, reason))
            )
          ),
          t('div', { className: 'rounded-3xl border border-slate-700/80 bg-slate-900/90 p-6 shadow-sm' },
            t('div', { className: 'flex flex-col gap-4 md:flex-row md:items-end md:justify-between' },
              t('div', null,
                t('div', { className: 'flex flex-wrap items-center gap-3' },
                  t('h2', { className: 'text-2xl font-semibold text-white' }, conditionName),
                  icd10 && t('span', { className: 'rounded-full bg-teal-600/15 px-3 py-1 text-xs font-semibold uppercase tracking-[0.18em] text-teal-200' }, icd10)
                ),
                t('div', { className: 'mt-3 flex items-center gap-3 text-sm text-slate-400' },
                  t('div', null, 'Confidence'),
                  t('div', { className: 'rounded-full bg-slate-800/80 p-1.5 flex-1' },
                    t('div', { className: 'h-2 rounded-full bg-slate-800', style: { overflow: 'hidden' } },
                      t('div', { className: `h-2 rounded-full ${confidenceColor}`, style: { width: `${Math.min(confidence, 100)}%` } })
                    )
                  ),
                  t('span', { className: 'font-medium text-slate-100' }, `${confidence.toFixed(0)}%`)
                )
              ),
              t('div', { className: 'rounded-3xl bg-slate-950/80 px-4 py-3 text-xs uppercase tracking-[0.15em] text-slate-300' }, `${activeTab.title} responded in ${responseTime || '0.00'}s`)
            )
          ),
          t('div', { className: 'grid gap-5 xl:grid-cols-2' },
            t('div', { className: 'rounded-3xl border border-slate-700/80 bg-slate-900/90 p-6 shadow-sm' },
              t('div', { className: 'flex items-center gap-3 text-sm font-semibold text-slate-100' },
                t(Icon, { name: 'Pill', className: 'w-5 h-5 text-teal-300' }),
                t('span', null, 'Recommended Medicines')
              ),
              medicines.length === 0
                ? t('p', { className: 'mt-4 text-sm text-slate-400' }, 'No medicine suggestions available.')
                : t('div', { className: 'mt-5 space-y-4' },
                    medicines.map((medicine, index) => t('div', { key: index, className: 'rounded-3xl border border-slate-700/90 bg-slate-950/80 p-4' },
                      t('div', { className: 'flex items-center justify-between gap-3' },
                        t('div', null,
                          t('div', { className: 'text-sm font-semibold text-white' }, medicine.name || 'Unknown medicine'),
                          t('div', { className: 'mt-1 text-xs text-slate-500' }, medicine.dosage_form || '—')
                        ),
                        t('span', { className: 'rounded-full bg-slate-800 px-2.5 py-1 text-[11px] uppercase tracking-[0.16em] text-slate-400' }, formatCitation(medicine.citation))
                      ),
                      t('p', { className: 'mt-3 text-sm leading-6 text-slate-300' }, medicine.dose_instruction || 'No dosage details provided.'),
                      t('div', { className: 'mt-4 flex flex-wrap gap-2' },
                        t('span', { className: 'rounded-full bg-emerald-500/10 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.18em] text-emerald-200' }, 'Verified')
                      )
                    ))
                  )
            ),
            t('div', { className: 'space-y-5' },
              t('div', { className: 'rounded-3xl border border-slate-700/80 bg-slate-900/90 p-6 shadow-sm' },
                t('div', { className: 'flex items-center gap-3 text-sm font-semibold text-slate-100' },
                  t(Icon, { name: 'ListChecks', className: 'w-5 h-5 text-teal-300' }),
                  t('span', null, 'Differential Diagnoses')
                ),
                t('div', { className: 'mt-4 flex flex-wrap gap-2' },
                  differentials.length === 0
                    ? t('span', { className: 'rounded-full bg-slate-800 px-3 py-2 text-sm text-slate-400' }, 'No entries available')
                    : differentials.map((diff, idx) => {
                        const diffText = diff?.name ? `${diff.name}${diff.icd10 ? ` (${diff.icd10})` : ''}` : String(diff);
                        return t('span', { key: idx, className: 'rounded-full bg-slate-800/90 px-3 py-2 text-sm text-slate-300' }, diffText);
                      })
                )
              ),
              t('div', { className: 'rounded-3xl border border-slate-700/80 bg-slate-900/90 p-6 shadow-sm' },
                t('div', { className: 'flex items-center justify-between gap-3' },
                  t('div', { className: 'flex items-center gap-3 text-sm font-semibold text-slate-100' },
                    t(Icon, { name: 'ArrowRightCircle', className: 'w-5 h-5 text-teal-300' }),
                    t('span', null, 'Action & Refer')
                  ),
                  t('span', { className: `rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-[0.18em] ${action.color}` }, action.label)
                ),
                response.refer_to_specialist && t('div', { className: 'mt-4 rounded-3xl bg-amber-500/10 p-4 text-sm text-amber-100' },
                  t('div', { className: 'font-semibold text-amber-100' }, 'Refer to specialist'),
                  t('p', { className: 'mt-2 text-slate-200' }, response.refer_reason || 'Referral recommended based on clinical risk factors.')
                )
              )
            )
          ),
          t('div', { className: 'rounded-3xl border border-slate-700/80 bg-slate-900/90 p-6 shadow-sm' },
            t('button', {
              type: 'button',
              onClick: () => setClassifierOpen(prev => !prev),
              className: 'flex w-full items-center justify-between gap-3 text-left text-sm font-semibold text-slate-100'
            },
              t('div', { className: 'flex items-center gap-3' },
                t(Icon, { name: 'Cpu', className: 'w-5 h-5 text-teal-300' }),
                t('span', null, 'ML Classifier Signal (weak)')
              ),
              t(Icon, { name: classifierOpen ? 'ChevronUp' : 'ChevronDown', className: 'w-5 h-5 text-slate-300' })
            ),
            classifierOpen && t('div', { className: 'mt-5 space-y-4' },
              classifier.slice(0, 5).map((item, index) => {
                const value = Number(item.probability || 0);
                return t('div', { key: index },
                  t('div', { className: 'flex items-center justify-between gap-4 text-sm text-slate-300' },
                    t('span', null, item.label || 'Unknown'),
                    t('span', null, `${Math.min(100, value * 100).toFixed(0)}%`)
                  ),
                  t('div', { className: 'mt-2 h-2 rounded-full bg-slate-800' },
                    t('div', { className: 'h-2 rounded-full bg-teal-500', style: { width: `${Math.min(100, value * 100)}%` } })
                  )
                );
              })
            )
          ),
          t('div', { className: 'rounded-3xl border border-slate-700/80 bg-slate-900/90 p-6 shadow-sm' },
            t('div', { className: 'flex items-center gap-3 text-sm font-semibold text-slate-100' },
              t(Icon, { name: 'FileText', className: 'w-5 h-5 text-teal-300' }),
              t('span', null, 'Clinical Reasoning')
            ),
            t('p', { className: 'mt-4 text-sm leading-7 text-slate-300 italic' }, response.llm_reasoning || 'No reasoning details were returned.' )
          )
        );
      }

      return t('div', { className: 'min-h-screen bg-[radial-gradient(circle_at_top,_rgba(13,148,136,0.16),_transparent_35%),_radial-gradient(circle_at_bottom_right,_rgba(56,189,248,0.08),_transparent_30%)] py-10 px-4 sm:px-6 lg:px-8' },
        t('div', { className: 'mx-auto max-w-6xl space-y-8' },
          t('div', { className: 'rounded-[2rem] border border-slate-700/80 bg-slate-950/95 p-8 shadow-2xl shadow-slate-950/40' },
            t('div', { className: 'flex flex-col gap-4 md:flex-row md:items-end md:justify-between' },
              t('div', null,
                t('p', { className: 'text-sm uppercase tracking-[0.3em] text-teal-300/90' }, 'Clinical Decision Support'),
                t('h1', { className: 'mt-3 text-3xl font-semibold text-white sm:text-4xl' }, 'Pakistani Hospital AI Triage Dashboard'),
                t('p', { className: 'mt-3 max-w-2xl text-sm leading-6 text-slate-400 sm:text-base' }, 'Run patient data through a dedicated LLM diagnosis backend, compare outputs, and explore recommendations in a modern, high-contrast clinical UI.')
              ),
              t('div', { className: 'inline-flex items-center gap-3' },
                t('select', {
                  value: selectedSample,
                  onChange: e => setSelectedSample(Number(e.target.value)),
                  className: 'field-focus rounded-3xl border border-slate-700 bg-slate-900/95 px-3 py-3 text-sm text-slate-100'
                },

              t('button', {
